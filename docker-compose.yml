version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: candidate-360-postgres
    environment:
      POSTGRES_DB: candidate_360_nps
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - candidate-360-network

  redis:
    image: redis:7-alpine
    container_name: candidate-360-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - candidate-360-network

  # MailHog - Local Email Testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: candidate-360-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    networks:
      - candidate-360-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: candidate-360-network

