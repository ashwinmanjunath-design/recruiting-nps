#!/bin/bash

# Kubernetes Deployment Manifests for Candidate 360° NPS Platform
# Use with: kubectl apply -f k8s/

# =====================================================
# NAMESPACE
# =====================================================
apiVersion: v1
kind: Namespace
metadata:
  name: candidate-nps

---
# =====================================================
# CONFIGMAP
# =====================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: candidate-nps
data:
  NODE_ENV: "production"
  PORT: "4000"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  SR_MOCK_MODE: "false"

---
# =====================================================
# SECRETS (Base64 encoded)
# =====================================================
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: candidate-nps
type: Opaque
data:
  # echo -n 'your-jwt-secret' | base64
  JWT_SECRET: <BASE64_ENCODED_JWT_SECRET>
  DATABASE_URL: <BASE64_ENCODED_DATABASE_URL>
  REDIS_PASSWORD: <BASE64_ENCODED_REDIS_PASSWORD>

---
# =====================================================
# BACKEND DEPLOYMENT
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: candidate-nps
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: your-registry/candidate-nps-backend:latest
        ports:
        - containerPort: 4000
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 5

---
# =====================================================
# BACKEND SERVICE
# =====================================================
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: candidate-nps
spec:
  selector:
    app: backend
  ports:
  - protocol: TCP
    port: 4000
    targetPort: 4000
  type: ClusterIP

---
# =====================================================
# WORKER DEPLOYMENT
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: candidate-nps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: your-registry/candidate-nps-worker:latest
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"

---
# =====================================================
# FRONTEND DEPLOYMENT
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: candidate-nps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: your-registry/candidate-nps-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
# =====================================================
# FRONTEND SERVICE
# =====================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: candidate-nps
spec:
  selector:
    app: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: LoadBalancer

---
# =====================================================
# INGRESS (with SSL)
# =====================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: candidate-nps
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - your-domain.com
    - api.your-domain.com
    secretName: tls-secret
  rules:
  - host: your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
  - host: api.your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 4000

---
# =====================================================
# HORIZONTAL POD AUTOSCALER
# =====================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: candidate-nps
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

